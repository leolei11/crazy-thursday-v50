<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>疯狂星期四｜今日限定</title>
    <meta name="description" content="今天也要认真吃点好的。点开看看今日隐藏菜单。" />
    <meta name="theme-color" content="#d71920" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="疯狂星期四｜今日限定" />
    <meta property="og:description" content="今天也要认真吃点好的。点开看看今日隐藏菜单。" />
    <meta property="og:image" content="https://leolei11.github.io/crazy-thursday-v50/assets/share-card.png" />
    <meta property="og:url" content="https://leolei11.github.io/crazy-thursday-v50/" />
    <link rel="icon" href="./assets/share-card.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="decoy-gate" id="decoyGate" role="dialog" aria-label="疯狂星期四入口">
      <div class="decoy-ticket">
        <p class="decoy-label">今日限定</p>
        <p class="decoy-title">疯狂星期四</p>
        <p class="decoy-price">V 我 50</p>
        <p class="decoy-copy">点开看看今天的隐藏菜单</p>
        <button class="decoy-button" id="decoyButton" type="button">立即查看</button>
      </div>
    </div>

    <main class="wardrobe" aria-label="饰品滑动故事">
      <section class="stage" id="stage" tabindex="0" aria-label="当前画面">
        <video
          class="ending-video"
          id="endingVideo"
          src="./assets/video/background.mp4"
          preload="auto"
          muted
          playsinline
          hidden
        ></video>

        <div class="portrait-frame" aria-label="原始造型和当前饰品">
          <img class="base-image" src="./assets/base.png" alt="原始头像" draggable="false" />
          <div class="sticker-layer" aria-hidden="true"></div>
        </div>

        <div class="stage-sheen" aria-hidden="true"></div>

        <div class="look-copy" id="lookCopy" aria-live="polite">
          <p class="look-index" id="lookIndex">01 / 06</p>
          <p class="look-caption" id="lookCaption"></p>
        </div>

        <audio id="bgMusic" src="./assets/music/background.m4a" preload="auto" loop></audio>

        <button class="music-button" id="musicButton" type="button" aria-label="播放背景音乐">
          <svg class="music-icon music-icon--play" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 18V5l11-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="17" cy="16" r="3" />
          </svg>
          <svg class="music-icon music-icon--pause" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5v14" />
            <path d="M16 5v14" />
          </svg>
        </button>

        <button class="nav-button nav-button--prev" id="prevButton" type="button" aria-label="上一页">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <button class="nav-button nav-button--next" id="nextButton" type="button" aria-label="下一页">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 6l6 6-6 6" />
          </svg>
        </button>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
